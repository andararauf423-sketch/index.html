<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AzurHub Admin | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5">
    <h1 class="text-2xl font-bold text-blue-400 mb-6">AzurHub Admin Panel 🛠️</h1>
    
    <div id="order-list" class="space-y-4">
        <p class="text-slate-400">Menunggu pesanan masuk...</p>
    </div>

    <script type="module">
        // Import Firebase (Versi CDN buat Web Lite)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG HASIL COPY-PASTE LO TADI
        const firebaseConfig = {
            apiKey: "AIzaSyCgn6BJJ8H4_JrudtgK__H1NNtV-eIAoO8",
            authDomain: "azurhub-system.firebaseapp.com",
            projectId: "azurhub-system",
            storageBucket: "azurhub-system.firebasestorage.app",
            messagingSenderId: "897658533775",
            appId: "1:897658533775:web:17b04bcd1c068c33757dfa",
            measurementId: "G-H6Y9KE5C42"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Munculin Data dari Firestore
        const orderList = document.getElementById('order-list');
        onSnapshot(collection(db, "orders"), (snapshot) => {
            orderList.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                
                const card = document.createElement('div');
                card.className = "p-4 bg-slate-800 rounded-lg border border-slate-700";
                card.innerHTML = `
                    <p class="text-xs text-slate-500">ID: ${id}</p>
                    <p class="font-bold text-lg text-blue-300">${data.nama_user || 'Member Azur'}</p>
                    <div class="bg-black p-3 rounded mt-2 text-green-400 font-mono text-sm">
                        ${data.request}
                    </div>
                    <div class="mt-4">
                        ${data.status === 'pending' ? 
                            `<button onclick="approveOrder('${id}', '${data.request}')" class="bg-blue-600 w-full py-2 rounded-md font-bold hover:bg-blue-500 transition">APPROVE & RAKIT AI</button>` : 
                            `<p class="text-center text-green-500 font-bold italic">PROSES SELESAI ✅</p>`
                        }
                    </div>
                `;
                orderList.appendChild(card);
            });
        });

        // Fungsi Approve (Panggil Netlify Function lo)
        window.approveOrder = async (orderId, promptUser) => {
            alert("AI AzurHub lagi kerja, jangan di-close!");
            try {
                const response = await fetch('/.netlify/functions/generate', {
                    method: 'POST',
                    body: JSON.stringify({ prompt: promptUser })
                });
                const resData = await response.json();
                
                if (resData.html) {
                    await updateDoc(doc(db, "orders", orderId), {
                        status: "done",
                        htmlContent: resData.html,
                        completedAt: serverTimestamp()
                    });
                    alert("Website berhasil dirakit!");
                }
            } catch (err) {
                alert("Error: " + err.message);
            }
        };
    </script>
</body>
</html>
